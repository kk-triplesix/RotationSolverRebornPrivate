name: Build & Release
on:
  push:
    tags:
      - '*.*.*.*'

jobs:
  Build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get Tag Version
        run: |
          $tag = "${{ github.ref }}" -replace 'refs/tags/', ''
          "tag=$tag" | Out-File -Append -FilePath $Env:GITHUB_ENV

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip -DestinationPath "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore NuGet Packages
        run: dotnet restore RotationSolver/RotationSolver.csproj

      - name: Build Plugin
        run: |
          dotnet build --no-restore -c Release RotationSolver/RotationSolver.csproj `
            -p:AssemblyVersion=${{ env.tag }} `
            -p:FileVersion=${{ env.tag }} `
            -p:InformationalVersion=${{ env.tag }} `
            --output .\build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./build/RotationSolver/latest.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Plugin Repo Update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLUGIN_REPO_TOKEN }}
          repository: kk-triplesix/DalamudPlugins
          event-type: plugin-updated
          client-payload: '{"plugin": "RotationSolver", "version": "${{ env.tag }}"}'
